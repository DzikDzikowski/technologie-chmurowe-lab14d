services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    networks:
      - backend
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_root_password
      - db_password
    restart: unless-stopped

  php:
    image: php:8.2-fpm
    container_name: php
    networks:
      - backend
    volumes:
      - ./src:/var/www/html
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    networks:
      - frontend
      - backend
    ports:
      - "4001:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    container_name: phpmyadmin
    networks:
      - backend
    ports:
      - "6001:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    restart: unless-stopped

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

secrets:
  db_root_password:
    file: ./db_root_password.txt
  db_password:
    file: ./db_password.txt